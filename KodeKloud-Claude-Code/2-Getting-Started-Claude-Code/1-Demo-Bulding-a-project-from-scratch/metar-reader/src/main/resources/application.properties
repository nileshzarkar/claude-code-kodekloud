quarkus.application.name=metar-reader
quarkus.http.port=8080

# Aviation Weather REST client
quarkus.rest-client.aviation-weather.url=https://aviationweather.gov
quarkus.rest-client.aviation-weather.connect-timeout=5000
quarkus.rest-client.aviation-weather.read-timeout=10000

# CORS — allow browser requests from any origin (needed for the frontend)
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,OPTIONS

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
