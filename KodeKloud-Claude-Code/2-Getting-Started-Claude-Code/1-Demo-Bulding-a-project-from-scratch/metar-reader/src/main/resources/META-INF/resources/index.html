<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>METAR Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2b6cb0;
    }

    header p {
      margin-top: 0.4rem;
      color: #718096;
      font-size: 0.95rem;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 2rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #cbd5e0;
      border-radius: 8px;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: #3182ce; }

    .search-box button {
      padding: 0.75rem 1.25rem;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover { background: #2c5282; }
    .search-box button:disabled { background: #a0aec0; cursor: default; }

    #result { width: 100%; max-width: 640px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      background: #2b6cb0;
      color: #fff;
      padding: 1.25rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header .station { font-size: 1.5rem; font-weight: 700; }
    .card-header .time { font-size: 0.85rem; opacity: 0.85; }

    .badge {
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .badge-VFR  { background: #c6f6d5; color: #276749; }
    .badge-MVFR { background: #bee3f8; color: #2c5282; }
    .badge-IFR  { background: #fed7d7; color: #9b2c2c; }
    .badge-LIFR { background: #e9d8fd; color: #553c9a; }

    .friendly {
      padding: 1.25rem 1.5rem;
      font-size: 1.05rem;
      line-height: 1.7;
      color: #2d3748;
      border-bottom: 1px solid #e2e8f0;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .detail-item {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .detail-item:nth-child(odd) { border-right: 1px solid #e2e8f0; }

    .detail-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 0.2rem;
    }

    .detail-value {
      font-size: 1rem;
      font-weight: 600;
      color: #1a202c;
    }

    .detail-sub {
      font-size: 0.8rem;
      color: #718096;
    }

    .raw-metar {
      padding: 1rem 1.5rem;
    }

    .raw-metar summary {
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      user-select: none;
    }

    .raw-metar code {
      display: block;
      margin-top: 0.6rem;
      font-family: "Courier New", monospace;
      font-size: 0.85rem;
      background: #f7fafc;
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #e2e8f0;
      word-break: break-all;
      color: #4a5568;
    }

    .error-card {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 12px;
      padding: 1.5rem;
      color: #c53030;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .examples {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #a0aec0;
      text-align: center;
    }

    .examples button {
      background: none;
      border: none;
      color: #3182ce;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0 4px;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>&#9992; METAR Reader</h1>
    <p>Type an airport ICAO code to get a plain-English weather report.</p>
  </header>

  <div class="search-box">
    <input id="icao" type="text" maxlength="4" placeholder="e.g. KJFK" autocomplete="off" />
    <button id="fetchBtn" onclick="fetchMetar()">Get Weather</button>
  </div>

  <div class="examples">
    Try:
    <button onclick="lookupCode('KJFK')">KJFK</button>
    <button onclick="lookupCode('EGLL')">EGLL</button>
    <button onclick="lookupCode('VABB')">VABB</button>
    <button onclick="lookupCode('YSSY')">YSSY</button>
  </div>

  <div id="result" style="margin-top: 1.5rem;"></div>

  <script>
    const input = document.getElementById('icao');
    const btn   = document.getElementById('fetchBtn');
    const out   = document.getElementById('result');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchMetar(); });

    function lookupCode(code) {
      input.value = code;
      fetchMetar();
    }

    async function fetchMetar() {
      const code = input.value.trim().toUpperCase();
      if (!code || code.length < 3) {
        out.innerHTML = '<div class="error-card">Please enter a valid 3–4 character ICAO airport code.</div>';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading…';
      out.innerHTML = '';

      try {
        const res = await fetch(`/api/metar/${encodeURIComponent(code)}`);
        const data = await res.json();

        if (data.error) {
          out.innerHTML = `<div class="error-card">${escHtml(data.error)}</div>`;
          return;
        }

        out.innerHTML = buildCard(data);
      } catch (err) {
        out.innerHTML = '<div class="error-card">Could not connect to the server. Is the Quarkus app running?</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get Weather';
      }
    }

    function buildCard(d) {
      const badgeClass = `badge badge-${d.flightCategory || 'VFR'}`;

      const wind = d.wind
        ? (d.wind.calm
            ? 'Calm'
            : `${d.wind.directionCardinal || 'Variable'} · ${d.wind.speedKnots} kt (${d.wind.speedMph} mph)${d.wind.gustKnots ? ' gusts ' + d.wind.gustKnots + ' kt' : ''}`)
        : '—';

      const temp = d.temperatureCelsius != null
        ? `${d.temperatureCelsius}°C / ${d.temperatureFahrenheit}°F`
        : '—';

      const dew = d.dewPointCelsius != null
        ? `${d.dewPointCelsius}°C / ${d.dewPointFahrenheit}°F`
        : '—';

      const pressure = d.pressureHpa
        ? `${d.pressureHpa} hPa · ${d.pressureInHg} inHg`
        : '—';

      const clouds = (d.cloudLayers && d.cloudLayers.length > 0)
        ? d.cloudLayers.map(c => c.description).join('<br>')
        : 'Clear';

      const phenomena = (d.weatherPhenomena && d.weatherPhenomena.length > 0)
        ? escHtml(d.weatherPhenomena.join(', '))
        : null;

      return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="station">${escHtml(d.station)}</div>
              <div class="time">${escHtml(d.observationTime || '')}</div>
            </div>
            <span class="${badgeClass}">${escHtml(d.flightCategory || '')}</span>
          </div>

          <div class="friendly">${escHtml(d.friendlyReport || '')}</div>

          <div class="details">
            <div class="detail-item">
              <div class="detail-label">Temperature</div>
              <div class="detail-value">${escHtml(temp)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Dew Point</div>
              <div class="detail-value">${escHtml(dew)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Wind</div>
              <div class="detail-value">${escHtml(wind)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Visibility</div>
              <div class="detail-value detail-sub">${escHtml(d.visibilityDescription || '—')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Sky / Clouds</div>
              <div class="detail-value detail-sub">${clouds}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Pressure</div>
              <div class="detail-value detail-sub">${escHtml(pressure)}</div>
            </div>
            ${phenomena ? `
            <div class="detail-item" style="grid-column: span 2;">
              <div class="detail-label">Weather</div>
              <div class="detail-value detail-sub">${phenomena}</div>
            </div>` : ''}
          </div>

          <details class="raw-metar">
            <summary>Raw METAR</summary>
            <code>${escHtml(d.rawMetar || '')}</code>
          </details>
        </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
