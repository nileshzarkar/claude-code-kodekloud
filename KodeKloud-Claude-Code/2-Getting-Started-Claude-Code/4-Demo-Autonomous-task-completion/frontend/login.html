<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Auth System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to your account</p>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
    </form>

    <div id="msgBox" class="alert alert-error"></div>

    <div class="link-row">
        Don't have an account? <a href="register.html">Register</a>
    </div>
</div>

<script src="app.js"></script>
<script>
    redirectIfLoggedIn();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlert('msgBox');

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('submitBtn');

        if (!email || !password) { showAlert('msgBox', 'Email and password are required'); return; }

        setLoading(btn, true);
        try {
            const { ok, status, data } = await apiFetch('/login', {
                method: 'POST',
                body: JSON.stringify({ email, password }),
            });

            if (ok && data?.token) {
                TokenStore.set(data.token);
                window.location.href = 'dashboard.html';
            } else {
                const msg = data?.error || 'Login failed';
                // Give a helpful hint for unverified accounts
                if (status === 401 && msg.toLowerCase().includes('verify')) {
                    showAlert('msgBox', msg + ' (Check the backend console for the verification link.)');
                } else {
                    showAlert('msgBox', msg);
                }
            }
        } catch (err) {
            showAlert('msgBox', 'Cannot reach the server. Is the Quarkus backend running on port 8080?');
        } finally {
            setLoading(btn, false);
        }
    });
</script>
</body>
</html>
