# ===== Data Source (H2 in-memory) =====
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=

# ===== Hibernate ORM =====
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# ===== JWT (HS256, min 256-bit / 32-char secret) =====
app.jwt.secret=auth-system-secret-key-2024-hs256-minimum-256-bits-secure-random
app.jwt.expiry-seconds=3600

# ===== CORS (allow all origins for development) =====
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=false

# ===== HTTP =====
quarkus.http.port=8080

# ===== Logging =====
quarkus.log.level=INFO
quarkus.log.category."com.auth".level=DEBUG
