quarkus.application.name=metar-reader
quarkus.http.port=8080

# Aviation Weather REST Client
quarkus.rest-client.aviation-weather.url=https://aviationweather.gov
quarkus.rest-client.aviation-weather.scope=jakarta.inject.Singleton
quarkus.rest-client.aviation-weather.connect-timeout=5000
quarkus.rest-client.aviation-weather.read-timeout=10000

# CORS - allow browser requests from any origin
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept

# OpenAPI & Swagger UI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.metar".level=DEBUG
